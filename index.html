    <!-- Prevent FOUC and enforce Dark Mode default -->
    <script>
      try {
        if (localStorage.getItem('theme') === 'light') {
          document.documentElement.classList.remove('dark');
        } else {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
